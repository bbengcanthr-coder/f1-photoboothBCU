<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Photo Frame Studio</title>
    <style>
        :root {
            --f1-red: #e10600;
            --f1-black: #15151e;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
        h1 { color: var(--f1-red); text-transform: uppercase; letter-spacing: 2px; }
        
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* สไตล์ส่วนจัดการรูป */
        #canvas-container { position: relative; display: inline-block; margin-top: 20px; border: 5px solid var(--f1-black); line-height: 0; }
        canvas { max-width: 100%; height: auto; background: #eee; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button, label { background: var(--f1-black); color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--f1-red); }
        input[type="file"] { display: none; }

        .frame-selector { display: flex; overflow-x: auto; gap: 10px; padding: 10px; margin-top: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .frame-item { width: 80px; height: 100px; object-fit: contain; cursor: pointer; border: 2px solid transparent; }
        .frame-item.active { border-color: var(--f1-red); }

        video { display: none; } /* ซ่อนกล้องตอนไม่ได้ใช้ */
    </style>
</head>
<body>

<div class="container">
    <h1>🏎️ F1 Photo Frame</h1>
    
    <div id="canvas-container">
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="frame-selector" id="frameSelector">
        </div>

    <div class="controls">
        <label for="upload-1">📸 อัปโหลดรูปช่องที่ 1</label>
        <input type="file" id="upload-1" accept="image/*" onchange="handleImage(event, 0)">
        
        <label for="upload-2">📸 อัปโหลดรูปช่องที่ 2</label>
        <input type="file" id="upload-2" accept="image/*" onchange="handleImage(event, 1)">
        
        <button onclick="startCamera()">📷 เปิดกล้องถ่ายรูป</button>
        <button onclick="downloadImage()" style="background: var(--f1-red);">🏎️ ดาวน์โหลดรูปภาพ</button>
    </div>

    <video id="video" width="640" height="480" autoplay></video>
</div>

<script>
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    
    // ตั้งค่าขนาด Canvas (เช่น อัตราส่วนเฟรมการ์ดมาตรฐาน)
    canvas.width = 800;
    canvas.height = 1200;

    let userImages = [null, null]; // เก็บรูปภาพ 2 ช่อง
    let currentFrame = new Image();
    currentFrame.src = 'frames/frame1.png'; // ค่าเริ่มต้น

    // ฟังก์ชันวาดภาพใหม่ทั้งหมด
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. วาดรูป User 2 รูปในตำแหน่งที่กำหนด (ปรับตัวเลข x, y, w, h ตามดีไซน์เฟรมของคุณ)
        if(userImages[0]) ctx.drawImage(userImages[0], 50, 100, 340, 500); 
        if(userImages[1]) ctx.drawImage(userImages[1], 410, 100, 340, 500);

        // 2. วาดเฟรมทับด้านบน (เฟรมต้องเป็น PNG ใส)
        ctx.drawImage(currentFrame, 0, 0, canvas.width, canvas.height);
    }

    // ฟังก์ชันจัดการรูปที่อัปโหลด
    function handleImage(e, index) {
        const reader = new FileReader();
        reader.onload = function(event){
            const img = new Image();
            img.onload = function(){
                userImages[index] = img;
                draw();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    // ฟังก์ชันเปลี่ยนเฟรม
    function selectFrame(index) {
        currentFrame.src = `frames/frame${index}.png`;
        currentFrame.onload = draw;
    }

    // ฟังก์ชันดาวน์โหลด
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'f1-photo-frame.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // สร้างปุ่มเลือกเฟรม 10 ปุ่มอัตโนมัติ
    const selector = document.getElementById('frameSelector');
    for(let i=1; i<=10; i++) {
        let img = document.createElement('img');
        img.src = `frames/frame${i}.png`;
        img.className = 'frame-item';
        img.onclick = () => selectFrame(i);
        selector.appendChild(img);
    }

    // วาดเริ่มต้น
    currentFrame.onload = draw;
</script>

</body>
</html>
