<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Grand Prix Photo Frames</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0b;
            --card-bg: #1f1f1f;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            color: var(--f1-red);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        p.subtitle {
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .section-title {
            width: 100%;
            max-width: 1200px;
            border-left: 4px solid var(--f1-red);
            padding-left: 15px;
            margin: 40px 0 20px;
            font-family: 'Orbitron', sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* Frame Styling */
        .frame-wrapper {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
        }

        .photo-frame {
            background: #fff; /* Border of the frame */
            padding: 10px;
            display: flex;
            gap: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* F1 Theme Accents */
            border-bottom: 15px solid var(--f1-red);
        }

        /* 5 Landscape Frames */
        .landscape { width: 300px; height: 200px; flex-direction: row; }
        .landscape .slot { width: 140px; height: 100%; }

        /* 5 Portrait Frames */
        .portrait { width: 240px; height: 320px; flex-direction: column; }
        .portrait .slot { width: 100%; height: 145px; }

        .slot {
            background: #eee;
            border: 1px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slot::after {
            content: '+';
            color: #ccc;
            font-size: 24px;
            position: absolute;
        }

        .slot.has-image::after { display: none; }

        .download-btn {
            margin-top: 15px;
            background: transparent;
            color: var(--text-white);
            border: 1px solid var(--f1-red);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            font-size: 12px;
        }

        .download-btn:hover {
            background: var(--f1-red);
            box-shadow: 0 0 15px var(--f1-red);
        }

        input[type="file"] { display: none; }
        
        .frame-label {
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--f1-red);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>F1 Photo Frame Station</h1>
    <p class="subtitle">Upload your photos to the Grand Prix collection</p>

    <h2 class="section-title">LANDSCAPE SERIES (5 Frames)</h2>
    <div class="grid-container" id="landscape-container"></div>

    <h2 class="section-title">PORTRAIT SERIES (5 Frames)</h2>
    <div class="grid-container" id="portrait-container"></div>

    <script>
        function createFrames(containerId, type, count) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'frame-wrapper';
                
                const label = document.createElement('div');
                label.className = 'frame-label';
                label.innerText = `FORMULA 1 EDITION - ${type.toUpperCase()} #${i}`;

                const frame = document.createElement('div');
                frame.className = `photo-frame ${type}`;
                frame.id = `${type}-${i}`;

                // Create 2 slots per frame
                for (let j = 1; j <= 2; j++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.onclick = () => triggerUpload(type, i, j);
                    slot.id = `img-${type}-${i}-${j}`;
                    frame.appendChild(slot);
                }

                const btn = document.createElement('button');
                btn.className = 'download-btn';
                btn.innerText = 'DOWNLOAD FRAME';
                btn.onclick = () => downloadFrame(`${type}-${i}`);

                wrapper.appendChild(label);
                wrapper.appendChild(frame);
                wrapper.appendChild(btn);
                container.appendChild(wrapper);
            }
        }

        function triggerUpload(type, frameIdx, slotIdx) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = event => {
                        const slot = document.getElementById(`img-${type}-${frameIdx}-${slotIdx}`);
                        slot.innerHTML = `<img src="${event.target.result}">`;
                        slot.classList.add('has-image');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function downloadFrame(frameId) {
            const frame = document.getElementById(frameId);
            html2canvas(frame).then(canvas => {
                const link = document.createElement('a');
                link.download = `f1-frame-${frameId}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Initialize 5 landscape and 5 portrait frames
        createFrames('landscape-container', 'landscape', 5);
        createFrames('portrait-container', 'portrait', 5);
    </script>
</body>
</html>
