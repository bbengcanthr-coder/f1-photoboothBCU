<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Grand Prix Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #101010;
            --card-bg: #1f1f1f;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            color: var(--f1-red);
            margin: 20px 0;
            text-transform: uppercase;
        }

        /* --- Camera & Preview Section --- */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border: 3px solid var(--f1-red);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button, .upload-label {
            background: var(--f1-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            transition: 0.3s;
            text-decoration: none;
        }

        button:hover { background: #b80500; }

        /* --- Frame Selection --- */
        .frame-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }

        .frame-option {
            border: 2px solid transparent;
            cursor: pointer;
            padding: 5px;
            text-align: center;
            font-size: 0.7rem;
            border-radius: 4px;
        }

        .frame-option.active { border-color: var(--f1-red); }

        /* --- Canvas Result Area --- */
        #canvas-wrapper {
            margin-top: 30px;
            padding: 20px;
            background: #000;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <h1>F1 Photocard Studio</h1>

    <div class="main-container">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>

        <div class="controls">
            <button onclick="captureImage(0)">Capture Slot 1</button>
            <button onclick="captureImage(1)">Capture Slot 2</button>
            <input type="file" id="upload" hidden accept="image/*" onchange="uploadImage(event)">
            <label for="upload" class="upload-label">Upload Image</label>
            <button onclick="downloadCanvas()" style="background: #2ecc71;">Download Result</button>
        </div>

        <p>Select Your Frame Theme:</p>
        <div class="frame-grid" id="frame-selector">
            </div>

        <div id="canvas-wrapper">
            <canvas id="photoCanvas"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        
        let slotImages = [null, null]; // Stores the two images
        let currentFrame = { type: 'horizontal', id: 1 };

        // 1. Initialize Camera
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera: ", err);
                alert("Please allow camera access.");
            }
        }

        // 2. Frame Options (5 Horizontal, 5 Vertical)
        function initFrames() {
            const selector = document.getElementById('frame-selector');
            for(let i=1; i<=10; i++) {
                const isHorizontal = i <= 5;
                const div = document.createElement('div');
                div.className = `frame-option ${i===1?'active':''}`;
                div.innerHTML = `${isHorizontal ? '━' : '┃'}<br>F1 Frame ${i}`;
                div.onclick = () => {
                    document.querySelectorAll('.frame-option').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    currentFrame = { type: isHorizontal ? 'horizontal' : 'vertical', id: i };
                    drawCanvas();
                };
                selector.appendChild(div);
            }
        }

        // 3. Capture and Upload
        function captureImage(slot) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);
            slotImages[slot] = tempCanvas.toDataURL('image/png');
            drawCanvas();
        }

        function uploadImage(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                slotImages[0] = e.target.result; // Default to slot 1 for uploads
                drawCanvas();
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // 4. Draw Canvas with F1 Style
        function drawCanvas() {
            const isH = currentFrame.type === 'horizontal';
            canvas.width = isH ? 800 : 500;
            canvas.height = isH ? 400 : 800;

            // Background
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Slots
            for(let i=0; i<2; i++) {
                const x = isH ? (i * (canvas.width/2)) + 10 : 10;
                const y = isH ? 10 : (i * (canvas.height/2)) + 10;
                const w = isH ? (canvas.width/2) - 20 : canvas.width - 20;
                const h = isH ? canvas.height - 20 : (canvas.height/2) - 20;

                if (slotImages[i]) {
                    const img = new Image();
                    img.src = slotImages[i];
                    img.onload = () => ctx.drawImage(img, x, y, w, h);
                } else {
                    ctx.strokeStyle = "#444";
                    ctx.strokeRect(x, y, w, h);
                    ctx.fillStyle = "#333";
                    ctx.fillText(`Slot ${i+1}`, x + w/2 - 20, y + h/2);
                }
            }

            // Draw F1 Frame Elements (Red borders, F1 Logo placeholder)
            ctx.strokeStyle = "#e10600";
            ctx.lineWidth = 15;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#e10600";
            ctx.font = "bold 20px Orbitron";
            ctx.fillText("F1 FORMULA 1", 30, canvas.height - 30);
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = `f1-photocard-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        setupCamera();
        initFrames();
        setTimeout(drawCanvas, 500);
    </script>
</body>
</html>
